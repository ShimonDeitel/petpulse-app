name: Petpulse
options:
  bundleIdPrefix: com.shimondeitel.petheart
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Petpulse:
    type: application
    platform: iOS
    sources:
      - path: Petpulse
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.petheart
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Petpulse/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  PetpulseTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PetpulseTests
      - path: Petpulse.storekit
    dependencies:
      - target: Petpulse
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.petheart.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  PetpulseUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: PetpulseUITests
    dependencies:
      - target: Petpulse
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.petheart.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Petpulse:
    build:
      targets:
        Petpulse: all
        PetpulseTests: [test]
        PetpulseUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Petpulse.storekit
    test:
      config: Debug
      storeKitConfiguration: Petpulse.storekit
      targets:
        - PetpulseTests
        - PetpulseUITests
    archive:
      config: Release
